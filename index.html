<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const STORAGE_KEY = 'cashflow-multi-account-pools-data-v1';
const LEGACY_STORAGE_KEY = 'cashpools-data';
const FREQUENCIES = ['weekly', 'fortnightly', 'monthly'];
const FREQ_LABEL = { weekly: 'Weekly', fortnightly: 'Fortnightly', monthly: 'Monthly' };
const ACCOUNT_PALETTE = [
  { name: 'Sharesies pink', value: '#FF4B93' },
  { name: 'Sharesies purple', value: '#6D3BFF' },
  { name: 'ANZ blue', value: '#005BAB' },
  { name: 'SBS orange', value: '#F58220' },
  { name: 'SBS gold', value: '#FFC72C' },
  { name: 'Teal', value: '#00A8A8' },
  { name: 'Lime', value: '#66C84F' },
  { name: 'Navy', value: '#172033' },
];
const POOL_PALETTE = ['#FF4B93', '#6D3BFF', '#005BAB', '#F58220', '#00A8A8', '#66C84F', '#FFC72C', '#E43D74'];
const colorAt = (i) => ACCOUNT_PALETTE[i % ACCOUNT_PALETTE.length].value;
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const round2 = (n) => Math.round((n + Number.EPSILON) * 100) / 100;
const safeNum = (n) => Number.isFinite(parseFloat(n)) ? parseFloat(n) : 0;
const formatMoney = (n) => { const sign = n < 0 ? '-' : ''; return sign + '$' + Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); };
const formatDate = (iso) => { if (!iso) return ''; const d = iso && iso.length <= 10 ? new Date(iso + 'T00:00:00') : new Date(iso); return d.toLocaleDateString('en-NZ', { day: 'numeric', month: 'short' }); };
const formatTime = (iso) => { if (!iso || iso.length <= 10) return ''; const d = new Date(iso); return d.toLocaleTimeString('en-NZ', { hour: '2-digit', minute: '2-digit' }); };
const formatDateTime = (iso) => { const date = formatDate(iso); const time = formatTime(iso); return time ? `${date}, ${time}` : date; };
function toISODate(d) { return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; }
function todayISO() { return toISODate(new Date()); }
function addDays(dateStr, n) { const d = new Date(dateStr + 'T00:00:00'); d.setDate(d.getDate() + n); return toISODate(d); }
function addMonthsClamped(dateStr, n) { const d = new Date(dateStr + 'T00:00:00'); const day = d.getDate(); d.setDate(1); d.setMonth(d.getMonth() + n); const daysInMonth = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate(); d.setDate(Math.min(day, daysInMonth)); return toISODate(d); }
function addInterval(dateStr, frequency) { if (frequency === 'weekly') return addDays(dateStr, 7); if (frequency === 'fortnightly') return addDays(dateStr, 14); if (frequency === 'monthly') return addMonthsClamped(dateStr, 1); return dateStr; }
function defaultData() { return { setupComplete: false, paydayFrequency: 'fortnightly', nextPaydayDate: '', accounts: [], transactions: [] }; }
function poolAllocation(account, pool) { if (pool.allocation !== undefined) return safeNum(pool.allocation); return round2(safeNum(account.paydayAmount) * safeNum(pool.percent) / 100); }
function migratePool(account, pool) { return { ...pool, allocation: round2(poolAllocation(account, pool)), balance: round2(safeNum(pool.balance)) }; }
function migrateLegacy(legacy) { if (!legacy || !legacy.setupComplete || !legacy.pools) return null; const accountId = genId(); const account = { id: accountId, name: 'Main account', color: colorAt(0), paydayAmount: legacy.paydayAmount || 0, pools: [] }; account.pools = (legacy.pools || []).map((p) => migratePool(account, p)); return { setupComplete: true, paydayFrequency: legacy.paydayFrequency || 'fortnightly', nextPaydayDate: legacy.nextPaydayDate || '', accounts: [account], transactions: (legacy.transactions || []).map((t) => ({ ...t, accountId, accountName: account.name })) }; }
function normaliseAutopayment(ap, data) { return { ...ap, frequency: ap.frequency || data.paydayFrequency || 'fortnightly', nextPaymentDate: ap.nextPaymentDate || ap.nextDate || data.nextPaydayDate || todayISO(), amount: round2(safeNum(ap.amount)) }; }
function normaliseData(data) { if (!data) return defaultData(); if (!data.setupComplete) return { ...defaultData(), ...data }; return { ...data, accounts: (data.accounts || []).map((a, i) => ({ ...a, color: a.color || colorAt(i), paydayAmount: round2(safeNum(a.paydayAmount)), pools: (a.pools || []).map((p) => migratePool(a, p)), autopayments: (a.autopayments || []).map((ap) => normaliseAutopayment(ap, data)) })), transactions: data.transactions || [] }; }
function getAccountTotal(account) { return round2((account.pools || []).reduce((s, p) => s + safeNum(p.balance), 0)); }
function allocationRemaining(account) { return round2(safeNum(account.paydayAmount) - (account.pools || []).reduce((s, p) => s + poolAllocation(account, p), 0)); }
function findPoolName(account, poolId) { return account.pools.find((p) => p.id === poolId)?.name || ''; }
function catchUpPaydays(data) {
  if (!data.accounts?.length) return { data, count: 0 };
  let accounts = data.accounts;
  let transactions = data.transactions || [];
  let nextPaydayDate = data.nextPaydayDate;
  const today = todayISO();
  let count = 0;
  const SAFETY_CAP = 156;

  if (data.paydayFrequency && nextPaydayDate) {
    while (nextPaydayDate <= today && count < SAFETY_CAP) {
      let newTxs = [];
      accounts = accounts.map((account) => {
        const pools = (account.pools || []).map((p) => {
          const amount = round2(poolAllocation(account, p));
          if (amount > 0) newTxs.push({ id: genId(), date: nextPaydayDate, type: 'deposit', accountId: account.id, accountName: account.name, poolId: p.id, poolName: p.name, amount, note: 'Payday' });
          return { ...p, balance: round2(safeNum(p.balance) + amount) };
        });
        return { ...account, pools };
      });
      transactions = [...newTxs, ...transactions];
      nextPaydayDate = addInterval(nextPaydayDate, data.paydayFrequency);
      count++;

function AccountHero({ account, data }) { return <div className="cp-hero" style={{ background: account.color || colorAt(0) }}><Wave /><div className="cp-hero-content"><div className="cp-hero-label">Total in this account's pools</div><div className="cp-hero-amount">{formatMoney(getAccountTotal(account))}</div>{data.paydayFrequency && data.nextPaydayDate && <div className="cp-hero-next">Next payday - {formatDate(data.nextPaydayDate)} ({FREQ_LABEL[data.paydayFrequency]})</div>}</div></div>; }

function AutopaymentList({ account }) { const autopayments = account.autopayments || []; if (!autopayments.length) return null; return <div className="cp-autopay-list"><div className="cp-autopay-title">Upcoming autopayments</div>{autopayments.map((ap) => <div className="cp-autopay-row" key={ap.id}><div><div className="cp-autopay-name">{ap.name}</div><div className="cp-autopay-meta">From {findPoolName(account, ap.poolId)} - next {formatDate(ap.nextPaymentDate)} - {FREQ_LABEL[ap.frequency] || ap.frequency}</div></div><div className="cp-autopay-amount">-{formatMoney(safeNum(ap.amount))}</div></div>)}</div>; }
function RecentActivity({ transactions, showHistory, setShowHistory }) { return <><button className="cp-history-toggle" onClick={() => setShowHistory((s) => !s)}>Recent activity {showHistory ? <ChevronUp size={16} /> : <ChevronDown size={16} />}</button>{showHistory && <div className="cp-history">{transactions.length === 0 && <div className="cp-empty">Nothing logged yet.</div>}{transactions.slice(0, 25).map((t) => <div className="cp-tx" key={t.id}><div><div className="cp-tx-pool">{t.poolName}</div><div className="cp-tx-note">{t.note || (t.type === 'deposit' ? 'Payday' : 'Spend')} - {formatDateTime(t.date)}{t.type === 'expense' ? ` - Split: ${t.splitSpend ? 'Yes' : 'No'}` : ''}</div></div><div className={`cp-tx-amount ${t.type === 'deposit' ? 'cp-tx-in' : 'cp-tx-out'}`}>{t.type === 'deposit' ? '+' : '-'}{formatMoney(Math.abs(t.amount))}</div></div>)}</div>}</>; }
function SpendModal({ account, initialPoolId, onClose, onSubmit }) { const [poolId, setPoolId] = useState(initialPoolId || account.pools[0]?.id || ''); const [amount, setAmount] = useState(''); const [note, setNote] = useState(''); const pool = account.pools.find((p) => p.id === poolId) || account.pools[0]; const valid = poolId && safeNum(amount) > 0; const submit = (splitSpend) => { if (!valid) return; onSubmit({ accountId: account.id, poolId, amount: round2(safeNum(amount)), note: note.trim(), splitSpend }); }; return <div className="cp-overlay" onClick={onClose}><div className="cp-modal" onClick={(e) => e.stopPropagation()}><div className="cp-modal-head"><h2>Enter the amount</h2><button className="cp-icon-btn-sm" onClick={onClose}><X size={18} /></button></div><div className="cp-input-money"><span>$</span><input type="number" inputMode="decimal" min="0" placeholder="0.00" autoFocus value={amount} onChange={(e) => setAmount(e.target.value)} /></div><div className="cp-spend-context">Spent from {pool?.name || 'pool'}<br /><span className="cp-muted">{account.name}</span></div><label className="cp-label">Vendor or note (optional)</label><input className="cp-text-input" placeholder="e.g. Countdown, dinner, Splitwise group" value={note} onChange={(e) => setNote(e.target.value)} />{!initialPoolId && <><label className="cp-label">From pool</label><select className="cp-select" value={poolId} onChange={(e) => setPoolId(e.target.value)}>{account.pools.map((p) => <option key={p.id} value={p.id}>{p.name}</option>)}</select></>}<h2 style={{ marginTop: 22 }}>Will you split this payment?</h2><div className="cp-split-row"><button className="cp-split-btn" disabled={!valid} onClick={() => submit(false)}>No</button><button className="cp-split-btn" disabled={!valid} onClick={() => submit(true)}>Yes</button></div></div></div>; }
function SettingsModal({ data, onClose, onSave, onReset, onExport, onExportBackup, onImportBackup }) {
  const [frequency, setFrequency] = useState(data.paydayFrequency || 'fortnightly'); const [nextPaydayDate, setNextPaydayDate] = useState(data.nextPaydayDate || ''); const [accounts, setAccounts] = useState(data.accounts.map((a, i) => ({ ...a, color: a.color || colorAt(i), paydayAmount: String(a.paydayAmount || ''), pools: a.pools.map((p) => ({ ...p, allocation: String(poolAllocation(a, p)), balance: safeNum(p.balance) })), autopayments: (a.autopayments || []).map((ap) => ({ ...ap, amount: String(ap.amount || ''), nextPaymentDate: ap.nextPaymentDate || data.nextPaydayDate || todayISO(), frequency: ap.frequency || data.paydayFrequency || 'fortnightly' })) }))); const [confirmReset, setConfirmReset] = useState(false); const importInputRef = React.useRef(null);
  const canSave = frequency && nextPaydayDate && accounts.every((a) => a.name.trim() && safeNum(a.paydayAmount) > 0 && a.pools.length && a.pools.every((p) => p.name.trim() && safeNum(p.allocation) >= 0) && Math.abs(allocationRemaining(a)) < 0.01 && (a.autopayments || []).every((ap) => ap.name.trim() && ap.poolId && safeNum(ap.amount) > 0 && ap.nextPaymentDate && ap.frequency));
  const updateAccount = (id, field, value) => setAccounts((as) => as.map((a) => a.id === id ? { ...a, [field]: value } : a)); const addAccount = () => setAccounts((as) => [...as, { id: genId(), name: '', color: colorAt(as.length), paydayAmount: '', pools: [{ id: genId(), name: '', allocation: '', balance: 0 }], autopayments: [] }]); const removeAccount = (id) => setAccounts((as) => as.length > 1 ? as.filter((a) => a.id !== id) : as); const updatePool = (accountId, poolId, field, value) => setAccounts((as) => as.map((a) => a.id !== accountId ? a : { ...a, pools: a.pools.map((p) => p.id === poolId ? { ...p, [field]: value } : p) })); const addPool = (accountId) => setAccounts((as) => as.map((a) => a.id !== accountId ? a : { ...a, pools: [...a.pools, { id: genId(), name: '', allocation: '', balance: 0 }] })); const removePool = (accountId, poolId) => setAccounts((as) => as.map((a) => a.id !== accountId ? a : { ...a, pools: a.pools.length > 1 ? a.pools.filter((p) => p.id !== poolId) : a.pools, autopayments: (a.autopayments || []).filter((ap) => ap.poolId !== poolId) }));
  const updateAutopayment = (accountId, apId, field, value) => setAccounts((as) => as.map((a) => a.id !== accountId ? a : { ...a, autopayments: (a.autopayments || []).map((ap) => ap.id === apId ? { ...ap, [field]: value } : ap) })); const addAutopayment = (accountId) => setAccounts((as) => as.map((a) => a.id !== accountId ? a : { ...a, autopayments: [...(a.autopayments || []), { id: genId(), name: '', poolId: a.pools[0]?.id || '', amount: '', nextPaymentDate: nextPaydayDate || todayISO(), frequency: frequency || 'fortnightly' }] })); const removeAutopayment = (accountId, apId) => setAccounts((as) => as.map((a) => a.id !== accountId ? a : { ...a, autopayments: (a.autopayments || []).filter((ap) => ap.id !== apId) }));
  const save = () => { if (!canSave) return; onSave({ ...data, paydayFrequency: frequency, nextPaydayDate, accounts: accounts.map((a) => ({ ...a, name: a.name.trim(), paydayAmount: round2(safeNum(a.paydayAmount)), pools: a.pools.map((p) => ({ ...p, name: p.name.trim(), allocation: round2(safeNum(p.allocation)), balance: round2(safeNum(p.balance)) })), autopayments: (a.autopayments || []).map((ap) => ({ ...ap, name: ap.name.trim(), amount: round2(safeNum(ap.amount)), nextPaymentDate: ap.nextPaymentDate, frequency: ap.frequency })) })) }); };
  return <div className="cp-overlay" onClick={onClose}><div className="cp-modal" onClick={(e) => e.stopPropagation()}><div className="cp-modal-head"><h2>Settings</h2><button className="cp-icon-btn-sm" onClick={onClose}><X size={18} /></button></div><label className="cp-label">How often are you paid?</label><FrequencyPicker value={frequency} onChange={setFrequency} /><label className="cp-label">Next payday date</label><input type="date" className="cp-date-input" value={nextPaydayDate} onChange={(e) => setNextPaydayDate(e.target.value)} /><div className="cp-section-title">Accounts & salary allocations</div><div className="cp-editor-list">{accounts.map((a) => <div className="cp-editor-card" key={a.id}><div className="cp-editor-top"><Droplet size={15} style={{ color: a.color }} /><input className="cp-name-input" placeholder="Account name" value={a.name} onChange={(e) => updateAccount(a.id, 'name', e.target.value)} /><div className="cp-money-box"><span>$</span><input type="number" inputMode="decimal" min="0" placeholder="0" value={a.paydayAmount} onChange={(e) => updateAccount(a.id, 'paydayAmount', e.target.value)} /></div><button className="cp-icon-btn-sm" onClick={() => removeAccount(a.id)} aria-label="Remove account"><X size={16} /></button></div><ColorPicker value={a.color} onChange={(c) => updateAccount(a.id, 'color', c)} /></div>)}</div><button className="cp-add-btn" onClick={addAccount}><Plus size={16} /> Add an account</button>{accounts.map((a) => <div key={a.id} className="cp-section-divider"><div className="cp-section-title">{a.name || 'Account'} pools</div><div className="cp-editor-list">{a.pools.map((p, i) => <div className="cp-flat-row" key={p.id}><Droplet size={14} style={{ color: POOL_PALETTE[i % POOL_PALETTE.length] }} /><input className="cp-name-input" placeholder="Pool name" value={p.name} onChange={(e) => updatePool(a.id, p.id, 'name', e.target.value)} /><div className="cp-money-box"><span>$</span><input type="number" inputMode="decimal" min="0" value={p.allocation} onChange={(e) => updatePool(a.id, p.id, 'allocation', e.target.value)} /></div><button className="cp-icon-btn-sm" onClick={() => removePool(a.id, p.id)} aria-label="Remove pool"><X size={16} /></button></div>)}</div><button className="cp-add-btn" onClick={() => addPool(a.id)}><Plus size={16} /> Add a pool</button><RemainingRow account={a} /><AutopaymentEditor account={a} updateAutopayment={updateAutopayment} addAutopayment={addAutopayment} removeAutopayment={removeAutopayment} /></div>)}<button className="cp-primary-btn" disabled={!canSave} onClick={save}>Save changes</button><button className="cp-secondary-btn" onClick={onExport}>Export activity to XLSX</button><button className="cp-secondary-btn" onClick={onExportBackup}>Export full backup</button><button className="cp-secondary-btn" onClick={() => importInputRef.current?.click()}>Import full backup</button><input ref={importInputRef} type="file" accept="application/json,.json" style={{ display: 'none' }} onChange={(e) => { onImportBackup(e.target.files?.[0]); e.target.value = ''; }} /><p className="cp-muted">Full backup is for restoring the app. XLSX export is just for reviewing transactions.</p><div className="cp-danger-zone">{!confirmReset ? <button className="cp-text-danger" onClick={() => setConfirmReset(true)}>Start over (clears everything)</button> : <div className="cp-confirm-row"><span>Clear all accounts, pools and history?</span><button className="cp-text-danger-confirm" onClick={onReset}>Yes, clear it</button><button className="cp-text-cancel" onClick={() => setConfirmReset(false)}>Cancel</button></div>}</div></div></div>;
}
function Wave() { return <svg className="cp-wave" viewBox="0 0 600 80" preserveAspectRatio="none" aria-hidden="true"><path className="cp-wave-back" d="M0,40 C100,80 200,0 300,40 C400,80 500,0 600,40 C700,80 800,0 900,40 L900,80 L0,80 Z" /><path className="cp-wave-front" d="M0,50 C100,20 200,80 300,50 C400,20 500,80 600,50 C700,20 800,80 900,50 L900,80 L0,80 Z" /></svg>; }
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<CashflowApp />);
</script>
</body>
